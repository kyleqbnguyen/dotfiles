source = ~/.config/hypr/config/variables.conf

###################
### KEYBINDINGS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main mainModifier

bind = $mainMod, Q, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, SPACE, exec, $toggle_rofi
bind = $mainMod, W, exec, $wall_select
bind = $mainMod, F, togglefloating
bind = $mainMod, P, exec, hyprpicker -a
bind = $mainMod, Z, exec, ~/.config/hypr/scripts/toggle_zen

bind = $mainMod, O, exec, ~/.config/hypr/scripts/toggle_obsidian_workspace

bind = $mainMod, C, exec, bash -c 'pgrep -x slurp && exit; set -o pipefail; grim -g "$(slurp)" - | wl-copy --type image/png && notify-send "Screenshot" "Copied to clipboard"'
bind = $mainMod SHIFT, C, exec, bash -c 'pgrep -x slurp && exit; grim -g "$(slurp)" ~/images/screenshots/ss-$(date +%Y%m%d-%H%M%S).png && notify-send "Screenshot" "Saved to ~/images/screenshots/"'

bind = $mainMod, S, exec, bash -c 'set -o pipefail; grim - | wl-copy --type image/png && notify-send "Screenshot" "Copied to clipboard"'
bind = $mainMod SHIFT, S, exec, grim ~/images/screenshots/ss-$(date +%Y%m%d-%H%M%S).png && notify-send "Screenshot" "Saved to ~/images/screenshots/"

# Move focus with mainMod + arrow keys
bind = $mainMod, H, movefocus, l
bind = $mainMod, J, movefocus, d
bind = $mainMod, K, movefocus, u
bind = $mainMod, L, movefocus, r

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspacesilent, 1
bind = $mainMod SHIFT, 2, movetoworkspacesilent, 2
bind = $mainMod SHIFT, 3, movetoworkspacesilent, 3
bind = $mainMod SHIFT, 4, movetoworkspacesilent, 4
bind = $mainMod SHIFT, O, movetoworkspacesilent, obsidian

# Move/resize windows with mainMod + LMB/RMB and dragging
bind = $mainMod, R, submap, fastedit
submap = fastedit

bind = , L, resizeactive, 20 0
bind = , H, resizeactive, -20 0
bind = , K, resizeactive, 0 -20
bind= , J, resizeactive, 0 20

bind = $mainMod, H, movewindow, l
bind = $mainMod, L, movewindow, r
bind = $mainMod, K, movewindow, u
bind = $mainMod, J, movewindow, d

bind = , escape, submap, reset

submap = reset

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 2%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 2%-
# bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
# bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
# bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 10%+
# bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 10%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
