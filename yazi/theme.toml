# Lackluster theme for Yazi - Monochrome style (netrw-like)

[mgr]
cwd = { fg = "#aaaaaa" }

find_keyword  = { fg = "#deeeed", bold = true }
find_position = { fg = "#aaaaaa", bg = "reset", bold = true }

marker_copied   = { fg = "#789978", bg = "#789978" }
marker_cut      = { fg = "#aa6666", bg = "#aa6666" }
marker_marked   = { fg = "#aaaaaa", bg = "#aaaaaa" }
marker_selected = { fg = "#deeeed", bg = "#deeeed" }

count_copied   = { fg = "#080808", bg = "#789978" }
count_cut      = { fg = "#080808", bg = "#aa6666" }
count_selected = { fg = "#080808", bg = "#aaaaaa" }

border_symbol = "|"
border_style  = { fg = "#2a2a2a" }

[mode]
normal_main = { fg = "#080808", bg = "#7a7a7a", bold = true }
normal_alt  = { fg = "#7a7a7a", bg = "#191919" }

select_main = { fg = "#080808", bg = "#789978", bold = true }
select_alt  = { fg = "#789978", bg = "#191919" }

unset_main  = { fg = "#080808", bg = "#aa6666", bold = true }
unset_alt   = { fg = "#aa6666", bg = "#191919" }

[status]
overall = { fg = "#aaaaaa", bg = "#191919" }

sep_left  = { open = "", close = "" }
sep_right = { open = "", close = "" }

perm_type  = { fg = "#555555" }
perm_read  = { fg = "#789978" }
perm_write = { fg = "#aa6666" }
perm_exec  = { fg = "#789978" }
perm_sep   = { fg = "#2a2a2a" }

progress_label  = { fg = "#aaaaaa", bold = true }
progress_normal = { fg = "#555555", bg = "#191919" }
progress_error  = { fg = "#aa6666", bg = "#191919" }

[indicator]
parent  = { fg = "#2a2a2a", bg = "#191919" }
current = { fg = "#555555", bg = "#191919" }
preview = { fg = "#2a2a2a", bg = "#191919" }
padding = { open = " ", close = " " }

[tabs]
active   = { fg = "#deeeed", bg = "#2a2a2a" }
inactive = { fg = "#555555", bg = "#191919" }

sep_inner = { open = "", close = "" }
sep_outer = { open = "", close = "" }

[pick]
border   = { fg = "#2a2a2a" }
active   = { fg = "#deeeed", bg = "#191919" }
inactive = { fg = "#555555" }

[input]
border   = { fg = "#2a2a2a" }
title    = { fg = "#aaaaaa" }
value    = { fg = "#deeeed" }
selected = { reversed = true }

[cmp]
border   = { fg = "#2a2a2a" }
active   = { fg = "#deeeed", bg = "#191919" }
inactive = { fg = "#555555" }

[tasks]
border  = { fg = "#2a2a2a" }
title   = { fg = "#aaaaaa" }
hovered = { fg = "#deeeed", bg = "#191919" }

[which]
cols = 3
mask = { bg = "#080808" }
cand = { fg = "#aaaaaa" }
rest = { fg = "#444444" }
desc = { fg = "#555555" }
separator = " -> "
separator_style = { fg = "#2a2a2a" }

[help]
on      = { fg = "#aaaaaa" }
run     = { fg = "#7a7a7a" }
desc    = { fg = "#555555" }
hovered = { reversed = true }
footer  = { fg = "#444444" }

[confirm]
border = { fg = "#2a2a2a" }
title  = { fg = "#aaaaaa" }
body   = { fg = "#7a7a7a" }
list   = { fg = "#555555" }
btn_yes = { fg = "#080808", bg = "#789978" }
btn_no  = { fg = "#080808", bg = "#aa6666" }

[spot]
border   = { fg = "#2a2a2a" }
title    = { fg = "#aaaaaa" }
tbl_col  = { fg = "#555555" }
tbl_cell = { fg = "#deeeed", bg = "#191919" }

[notify]
title_info  = { fg = "#789978" }
title_warn  = { fg = "#aaaaaa" }
title_error = { fg = "#aa6666" }

[filetype]
rules = [
	{ mime = "image/*", fg = "#7a7a7a" },
	{ mime = "{audio,video}/*", fg = "#7a7a7a" },
	{ mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*}", fg = "#555555" },
	{ mime = "application/pdf", fg = "#7a7a7a" },
	{ mime = "inode/empty", fg = "#444444" },
	{ url = "*", is = "orphan", fg = "#aa6666" },
	{ url = "*", is = "exec", fg = "#789978" },
	{ url = "*", is = "link", fg = "#555555", italic = true },
	{ url = "*/", fg = "#555555" },
]

[icon]
globs = []
dirs = []
files = []
exts = []
conds = []
